name: 抓取卡池并部署 Pages

on:
  workflow_dispatch:
    inputs:
      force_update:
        description: "忽略卡池结束时间，强制抓取所选游戏"
        required: true
        type: boolean
        default: true
      games:
        description: "手动刷新游戏，填 all 或 zzz,sr,ww,ys,arknights,endfield"
        required: true
        type: string
        default: "all"
  schedule:
    # GitHub Actions 使用 UTC；这里对应北京时间/新加坡时间 08:00、12:00、16:00、20:00。
    - cron: "0 0,4,8,12 * * *"
  push:
    branches:
      - main
    paths:
      - "spider/**"
      - "web/**"
      - ".github/workflows/main.yml"

permissions:
  contents: write
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: 抓取并构建静态站点
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip pages]')
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.maintenance.outputs.should_run }}
      games: ${{ steps.maintenance.outputs.games }}
      reason: ${{ steps.maintenance.outputs.reason }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: spider/requirements.txt

      - name: 判断是否进入卡池维护窗口
        id: maintenance
        working-directory: spider
        env:
          FORCE_UPDATE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_update || github.event_name == 'push' }}
          FORCE_GAMES: ${{ github.event_name == 'workflow_dispatch' && inputs.games || 'auto' }}
        run: python should_update.py

      - name: 安装爬虫依赖
        if: steps.maintenance.outputs.should_run == 'true'
        working-directory: spider
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 检查爬虫语法
        if: steps.maintenance.outputs.should_run == 'true'
        working-directory: spider
        run: python -m compileall spider run_spider.py should_update.py

      - name: 抓取最新卡池数据
        if: steps.maintenance.outputs.should_run == 'true'
        working-directory: spider
        run: python run_spider.py --games "${{ steps.maintenance.outputs.games }}"

      - name: 持久化定时维护数据
        if: steps.maintenance.outputs.should_run == 'true' && github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spider/data spider/img
          if [ -n "$(git status --porcelain spider/data spider/img)" ]; then
            git commit -m "更新卡池数据 [skip pages]"
            git push
          else
            echo "没有新的卡池数据需要提交。"
          fi

      - name: 设置 Node.js
        if: steps.maintenance.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: 安装前端依赖
        if: steps.maintenance.outputs.should_run == 'true'
        working-directory: web
        run: npm install --no-audit --no-fund

      - name: 检查前端代码
        if: steps.maintenance.outputs.should_run == 'true'
        working-directory: web
        run: npm run lint

      - name: 构建前端
        if: steps.maintenance.outputs.should_run == 'true'
        working-directory: web
        run: npm run build

      - name: 生成 SPA 404
        if: steps.maintenance.outputs.should_run == 'true'
        working-directory: web
        run: cp dist/index.html dist/404.html

      - name: 校验 Pages 产物
        if: steps.maintenance.outputs.should_run == 'true'
        working-directory: web
        run: |
          test -f dist/index.html
          test -f dist/404.html
          test -f dist/CNAME
          test -f dist/data/meta.json
          test -d dist/img

      - name: 配置 GitHub Pages
        if: steps.maintenance.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: 上传 Pages Artifact
        if: steps.maintenance.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: web/dist

  deploy:
    name: 发布到 GitHub Pages
    if: needs.build.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
